name: Tự Động Tổng Kết Thưởng Phạt Của Em Bé Yêu
on:
  schedule:
    - cron: "0 15 * * *" # 22:00 VN hằng ngày
    - cron: "0 16 28-31 * *" # 23:00 VN ngày cuối tháng
  workflow_dispatch: 

jobs:
  summary-job:
    runs-on: ubuntu-latest
    steps:
      - name: Chạy script tổng kết
        run: |
          cat << 'EOF' > script.js
          const fetchAndNotify = async () => {
            try {
              const supabaseUrl = process.env.SUPABASE_URL.replace(/\/$/, "");
              const supabaseKey = process.env.SUPABASE_ANON_KEY;
              const botToken = process.env.TELEGRAM_BOT_TOKEN;
              const idAnh = process.env.TELE_CHAT_ID_ANH;
              const idEm = process.env.TELE_CHAT_ID_EM || idAnh;

              // Lấy giờ Việt Nam chuẩn
              const now = new Date();
              const vnTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"}));
              const d = vnTime.getDate(), m = vnTime.getMonth() + 1, y = vnTime.getFullYear(), h = vnTime.getHours();
              
              const localISODate = `${y}-${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
              const supabaseHeaders = { "apikey": supabaseKey, "Authorization": `Bearer ${supabaseKey}`, "Content-Type": "application/json" };

              console.log(`[LOG] Đang chạy vào lúc: ${h}h ngày ${localISODate} (Giờ VN)`);

              const sendTele = async (chatId, text) => {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
                });
                if (!response.ok) {
                  console.error(`[ERR] Gửi Tele lỗi cho id ${chatId}:`, await response.text());
                } else {
                  console.log(`[LOG] Đã gửi Tele thành công cho id ${chatId}`);
                }
              };

              // TỔNG KẾT THÁNG (Chạy tự động lúc 23h HOẶC khi ní muốn test ép chạy bằng nút)
              // Nếu muốn test nhanh tổng kết tháng lúc ban ngày, ní có thể đổi tạm thành h === h
              if (h === 23) {
                const res = await fetch(`${supabaseUrl}/rest/v1/rewards_penalties?date=like.${y}-${m.toString().padStart(2, '0')}%&select=*`, { headers: supabaseHeaders });
                const data = await res.json();
                console.log(`[LOG] Số lượng bản ghi tháng này: ${data.length}`);
                
                let p = 0, t = 0;
                data.forEach(i => { p += Number(i.penalty_amount) || 0; t += Number(i.reward_amount) || 0; });
                const msg = `🏆 *BẢNG VÀNG THÁNG ${m}/${y}*\n\n🎁 Tổng thưởng: *${t}*\n💀 Tổng phạt: *${p}*\n\n📌 Kết luận: ${t >= p ? `Lãi *${t - p}* phiếu! 🥳` : `Nợ *${p - t}* phiếu phạt! 😈`}`;
                
                await sendTele(idAnh, msg); 
                await sendTele(idEm, msg);
              } else {
                // TỔNG KẾT NGÀY
                const res = await fetch(`${supabaseUrl}/rest/v1/rewards_penalties?date=eq.${localISODate}&select=*`, { headers: supabaseHeaders });
                const data = await res.json();
                console.log(`[LOG] Số lượng bản ghi hôm nay (${localISODate}): ${data.length}`);

                let p = 0, t = 0;
                data.forEach(i => { p += Number(i.penalty_amount) || 0; t += Number(i.reward_amount) || 0; });

                let bonus = (t > 0 && t < 9) ? 1 : 0;
                let tCuoi = t + bonus;
                let soDu = tCuoi - p;
                let status = soDu > 0 ? `Lãi *${soDu}* phiếu!` : (soDu === 0 ? `Huề cả làng!` : `Nợ *${Math.abs(soDu)}* phiếu!`);

                const bonusText = bonus > 0 ? ` (+1 bonus = *${tCuoi}*)` : ` *${t}*`;
                const msgNgay = `📢 *TỔNG KẾT ĐIỂM NGÀY ${d}/${m}/${y}*\n\n CỦA BÉ YÊU🎁 *Tổng thưởng:* +${bonusText} phiếu\n💀 *Tổng phạt:* -*${p}* phiếu\n\n📌 *Kết quả:* ${status}`;

                await sendTele(idAnh, msgNgay);
                if (idEm && idEm !== idAnh) {
                  await sendTele(idEm, msgNgay);
                }
              }
            } catch (err) {
              console.error("[CRITICAL ERROR]:", err);
            }
          };
          fetchAndNotify();
          EOF
          node script.js
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELE_BOT_TOKEN }}
          TELE_CHAT_ID_ANH: ${{ secrets.VITE_TELE_CHAT_ID_ANH }}
          TELE_CHAT_ID_EM: ${{ secrets.VITE_TELE_CHAT_ID_EM }}
